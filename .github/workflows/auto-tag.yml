name: Auto Tag Release

# Automatically cuts a release every time Cargo.toml's `version` changes on
# main, so nobody has to remember to run `git tag vX.Y.Z && git push origin
# vX.Y.Z` by hand. This exists because pushing tags from some environments
# (including Claude sessions working in this repo) 403s - but the Actions
# bot's own GITHUB_TOKEN *can* push tags within this repo, closing that gap.
#
# Flow: push to main touching Cargo.toml -> if `v<version>` doesn't already
# exist as a tag, create + push it, then explicitly dispatch release.yml
# against that tag. The explicit dispatch step is required, not optional:
# GitHub Actions does not let a push made with the default GITHUB_TOKEN
# trigger other workflows (an anti-recursion rule), so relying on
# release.yml's own `on: push: tags: ["v*"]` trigger here would silently
# never fire.
#
# To cut a release: just bump the `version` field in Cargo.toml (and the
# matching `craftmjne` entry near the top of Cargo.lock) as part of a normal
# commit to main. Nothing else to remember.

on:
  push:
    branches: [main]
    paths: ["Cargo.toml"]

permissions:
  contents: write
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: |
          v=$(grep -m1 '^version' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Create and push tag if it's new
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.version.outputs.version }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "$TAG already exists, nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          # Pushing the tag above won't trigger release.yml (GITHUB_TOKEN
          # pushes don't chain into other workflow runs), so dispatch it
          # explicitly against the tag we just created.
          gh workflow run release.yml --ref "$TAG"
