name: Release

# Push a tag like "v0.3.0" (matching Cargo.toml's `version`) to build native
# binaries for Windows/Linux/macOS and publish them as a GitHub Release.
#
# Two things read these release assets:
#  - CraftmjneSetup.exe: the first-time installer end users download. Bundles
#    the blocks/ directory (installer/craftmjne.nsi) - the game requires it
#    next to the exe at startup (see src/blocks.rs's find_blocks_dir).
#  - craftmjne-<target-triple>.<zip|tar.gz>: what the in-game auto-updater
#    (src/updater.rs, via the `self_update` crate) downloads on later runs.
#    Keep the archive naming (`craftmjne-<target-triple>`) in sync with any
#    target added to the matrix below — self_update matches on it. NOTE:
#    self_update only ever extracts and swaps the named binary out of this
#    archive, never other files - so even though the Linux/macOS tar.gz
#    bundles blocks/ too (for a fresh manual download), an in-place
#    auto-update does NOT refresh an existing install's blocks/ folder.
#    A block-definition change needs a fresh install until something
#    fills that gap.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp -r blocks target/${{ matrix.target }}/release/blocks
          cd target/${{ matrix.target }}/release
          tar czf "$GITHUB_WORKSPACE/craftmjne-${{ matrix.target }}.tar.gz" craftmjne blocks

      - name: Package (Windows, for the auto-updater)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/craftmjne.exe `
            -DestinationPath craftmjne-${{ matrix.target }}.zip

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y --no-progress

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          # NSIS resolves relative `File` paths against the .nsi script's own
          # directory (installer/), not the working directory - SRC_EXE must
          # be absolute or it silently resolves to installer/target/... and
          # fails with "no files found".
          $srcExe = Join-Path "${{ github.workspace }}" "target\${{ matrix.target }}\release\craftmjne.exe"
          & 'C:\Program Files (x86)\NSIS\makensis.exe' `
            "-DAPP_VERSION=$version" `
            "-DSRC_EXE=$srcExe" `
            installer\craftmjne.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: craftmjne-${{ matrix.target }}
          path: |
            craftmjne-${{ matrix.target }}.tar.gz
            craftmjne-${{ matrix.target }}.zip
            CraftmjneSetup.exe
          if-no-files-found: ignore

  release:
    needs: build
    # Publish whatever platforms did build even if one leg failed or got
    # stuck without a runner (macos-13 has been flaky) - previously a
    # single failed/cancelled matrix leg silently skipped this job and the
    # release. `!cancelled()` still skips if the whole run was cancelled.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
